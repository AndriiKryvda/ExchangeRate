<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exchange Rates — USD / EUR / UAH / Bitcoin / Gold / Silver</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────── -->
<header>
    <div class="header-inner">
        <h1>💱 Exchange Rates</h1>
        <p class="subtitle">USD · EUR · UAH · Bitcoin · Gold · Silver &mdash; National Bank of Ukraine</p>
    </div>
</header>

<main>

    <!-- ─── Current Rate Cards ─────────────────────── -->
    <section class="cards">
        <div class="card card-usd">
            <span class="card-label">USD / UAH</span>
            <span class="card-value" id="usd-uah-value">—</span>
            <span class="change" id="usd-uah-change"></span>
        </div>
        <div class="card card-eur">
            <span class="card-label">EUR / UAH</span>
            <span class="card-value" id="eur-uah-value">—</span>
            <span class="change" id="eur-uah-change"></span>
        </div>
        <div class="card card-cross">
            <span class="card-label">EUR / USD</span>
            <span class="card-value" id="eur-usd-value">—</span>
            <span class="change" id="eur-usd-change"></span>
        </div>
        <div class="card card-btc">
            <span class="card-label">Bitcoin / USD</span>
            <span class="card-value" id="btc-usd-value">—</span>
            <span class="change" id="btc-usd-change"></span>
        </div>
        <div class="card card-gold">
            <span class="card-label">Gold / USD</span>
            <span class="card-value" id="xau-usd-value">—</span>
            <span class="change" id="xau-usd-change"></span>
        </div>
        <div class="card card-silver">
            <span class="card-label">Silver / USD</span>
            <span class="card-value" id="xag-usd-value">—</span>
            <span class="change" id="xag-usd-change"></span>
        </div>
    </section>

    <p class="as-of" id="as-of-date"></p>

    <!-- ─── Controls ───────────────────────────────── -->
    <section class="controls">
        <select id="pair-select" class="pair-select" title="Currency pair">
            <option value="USD_UAH">USD / UAH</option>
            <option value="UAH_USD">UAH / USD</option>
            <option value="EUR_UAH">EUR / UAH</option>
            <option value="UAH_EUR">UAH / EUR</option>
            <option value="EUR_USD">EUR / USD</option>
            <option value="USD_EUR">USD / EUR</option>
            <option value="BTC_USD">Bitcoin / USD</option>
            <option value="XAU_USD">Gold / USD</option>
            <option value="XAG_USD">Silver / USD</option>
        </select>

        <div class="btn-group" id="period-group">
            <button class="period-btn" data-period="7">7 Days</button>
            <button class="period-btn active" data-period="30">30 Days</button>
            <button class="period-btn" data-period="90">90 Days</button>
        </div>

        <div class="btn-group" id="view-group">
            <button class="view-btn active" data-view="chart">📈 Chart</button>
            <button class="view-btn" data-view="table">📋 Table</button>
            <button class="view-btn" data-view="both">Both</button>
        </div>

        <button class="icon-btn" id="refresh-btn" title="Refresh data">⟳</button>
    </section>

    <!-- ─── Error message ──────────────────────────── -->
    <p class="error-msg" id="error-msg"></p>

    <!-- ─── Chart ──────────────────────────────────── -->
    <section class="chart-wrap" id="chart-section">
        <canvas id="rates-chart"></canvas>
    </section>

    <!-- ─── Table ──────────────────────────────────── -->
    <section class="table-wrap" id="table-section" style="display:none">
        <div class="table-header">
            <span>Exchange Rate History</span>
            <button class="icon-btn" id="export-csv" title="Export CSV">⬇ CSV</button>
        </div>
        <div class="table-scroll">
            <table id="rates-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th id="table-pair-header">Rate</th>
                    </tr>
                </thead>
                <tbody id="rates-tbody"></tbody>
            </table>
        </div>
    </section>

</main>

<!-- ─── Loading Overlay ────────────────────────────── -->
<div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading exchange rates…</p>
</div>

<footer>
    <p>Data source: <a href="https://bank.gov.ua" target="_blank" rel="noopener">National Bank of Ukraine</a></p>
</footer>

<script src="app.js"></script>
</body>
</html>
